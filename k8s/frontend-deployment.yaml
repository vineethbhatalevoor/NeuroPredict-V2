apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuropredict-frontend
  namespace: neuropredict
  labels:
    app: neuropredict-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neuropredict-frontend
  template:
    metadata:
      labels:
        app: neuropredict-frontend
    spec:
      containers:
      - name: frontend
        image: neuropredict-registry.azurecr.io/frontend:latest
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: neuropredict-frontend-service
  namespace: neuropredict
spec:
  selector:
    app: neuropredict-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
