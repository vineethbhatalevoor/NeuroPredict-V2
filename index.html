<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroPredict - Low-Cost Clinical Screening & Longitudinal Research Platform</title>
  <meta name="description" content="AI-assisted clinical screening platform for early neurodegenerative detection using behavioral telemetry and explainable machine learning.">
  <link rel="stylesheet" href="styles.css">
  <!-- Modern clean typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-container">
    
    <!-- Left Navigation Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <!-- Medical brain neural lattice icon -->
          <svg viewBox="0 0 24 24">
            <path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.07 19.58 10.48 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm1-8h-2v3H8v2h3v3h2v-3h3v-2h-3v-3z"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>NEUROPREDICT</h1>
          <span>RESEARCH · v0.2.1</span>
        </div>
      </div>
      
      <!-- Dynamic Nav Container filled by app.js -->
      <nav class="sidebar-nav" id="sidebar-nav-container">
        <div class="nav-section-title">Clinical Workspace</div>
        <div class="nav-item active" data-view="landing" onclick="navigateTo('landing')">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
          Platform Overview
        </div>
        <div class="nav-item" data-view="auth" onclick="navigateTo('auth')">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
          Physician Log In
        </div>
      </nav>
      
      <!-- Sidebar Footer Status indicator -->
      <div class="sidebar-footer">
        <div id="user-status-area">
          <div class="badge badge-amber" style="width: 100%; text-align: center;">UNAUTHENTICATED</div>
        </div>
        
        <div class="status-badge">
          <div class="status-dot"></div>
          <span>NEUROSIFT PIPELINE ACTIVE</span>
        </div>
      </div>
    </aside>
    
    <!-- Main Right Content Workspace -->
    <main class="content-area">
      <!-- Universal Top Nav bar controls -->
      <div class="top-header">
        <div class="top-header-left">
          <h2 id="view-title">NeuroPredict screening node</h2>
          <p id="view-description">Longitudinal motor reflex and task engagement telemetry</p>
        </div>
        <div class="top-header-right">
          <div style="font-size:12px; color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Node Host: India Region (DISHA Act Comp.)</div>
          <div class="badge badge-teal" style="font-size:10px;">SECURE SSL</div>
        </div>
      </div>
      
      <!-- Primary Viewport Container -->
      <div id="view-content" style="display: flex; flex-direction: column; gap: 32px;">
        <!-- Filled dynamically by app.js -->
      </div>
    </main>
    
  </div>

  <script src="app.js"></script>
  <script src="predict_page.js"></script>
</body>
</html>
